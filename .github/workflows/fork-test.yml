name: Fork - Build & Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - mm/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Envoy binary & Docker image
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Build release binary
        run: |
          mkdir -p /tmp/envoy-docker-build
          ENVOY_DOCKER_BUILD_DIR=/tmp/envoy-docker-build \
            ./ci/run_envoy_docker.sh \
              "./ci/do_ci.sh release.server_only"

      - name: Prepare Docker context
        run: |
          # The release binary is in /tmp/envoy-docker-build/envoy/x64/bin/release.tar.zst
          # (or arm64 depending on runner). Create the directory layout the Dockerfile expects.
          mkdir -p linux/amd64
          cp /tmp/envoy-docker-build/envoy/x64/bin/release.tar.zst linux/amd64/release.tar.zst

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distribution/docker/Dockerfile-envoy
          target: envoy
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/envoy-dev:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/envoy-dev:latest

      - name: Print image info
        run: |
          echo "============================================="
          echo "Docker image pushed to:"
          echo "  ghcr.io/${{ github.repository_owner }}/envoy-dev:${{ github.sha }}"
          echo "  ghcr.io/${{ github.repository_owner }}/envoy-dev:latest"
          echo ""
          echo "Pull with:"
          echo "  docker pull ghcr.io/${{ github.repository_owner }}/envoy-dev:latest"
          echo "============================================="
